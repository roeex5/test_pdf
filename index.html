<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Files</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
    h1 { font-size: 1.4rem; margin-bottom: 1rem; }
    ul { list-style: none; padding: 0; }
    li { margin: 8px 0; }
    a { text-decoration: none; color: #0366d6; }
    a:hover { text-decoration: underline; }
    #status { color: #666; font-style: italic; }
  </style>
</head>
<body>
  <h1>PDF Files</h1>
  <p id="status">Loading...</p>
  <ul id="file-list"></ul>

  <script>
    fetch('https://api.github.com/repos/roeex5/test_pdf/contents/')
      .then(r => r.json())
      .then(files => {
        const pdfs = files.filter(f => f.name.endsWith('.pdf'));
        const status = document.getElementById('status');
        const list = document.getElementById('file-list');

        if (pdfs.length === 0) {
          status.textContent = 'No PDF files found.';
          return;
        }

        status.remove();
        pdfs.forEach(f => {
          const li = document.createElement('li');
          const a = document.createElement('a');
          a.href = `https://roeex5.github.io/test_pdf/${f.name}`;
          a.textContent = f.name;
          a.target = '_blank';
          li.appendChild(a);
          list.appendChild(li);
        });
      })
      .catch(() => {
        document.getElementById('status').textContent = 'Failed to load file list.';
      });
  </script>
</body>
</html>
